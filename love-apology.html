<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }

        .heart-container {
            position: relative;
            width: 200px;
            height: 200px;
            animation: heartbeat 1s ease-in-out infinite;
        }

        .heart {
            position: absolute;
            width: 100px;
            height: 90px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 50%, #ff4757 100%);
            border-radius: 50px 50px 0 0;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .heart::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes expand {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        .heart-expand {
            animation: expand 1.5s ease-out forwards;
        }

        .message {
            position: absolute;
            font-size: 28px;
            color: #fff;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message.love {
            top: 30%;
            color: #ff6b6b;
        }

        .message.apology {
            top: 60%;
            color: #feca57;
        }

        .hearts-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 4s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="heart-container" id="heartContainer">
        <div class="heart" id="heart"></div>
    </div>

    <div class="message love" id="loveMsg">我爱你</div>
    <div class="message apology" id="apologyMsg">我错了，请原谅我</div>

    <script>
        const heart = document.getElementById('heart');
        const heartContainer = document.getElementById('heartContainer');
        const loveMsg = document.getElementById('loveMsg');
        const apologyMsg = document.getElementById('apologyMsg');
        const heartsBg = document.getElementById('heartsBg');

        // 爱心展开动画
        heart.classList.add('heart-expand');

        // 3秒后显示"我爱你"
        setTimeout(() => {
            loveMsg.classList.add('show');
            createFloatingHearts();
        }, 1500);

        // 5秒后显示道歉信息
        setTimeout(() => {
            loveMsg.classList.remove('show');
            apologyMsg.classList.add('show');
        }, 5000);

        // 创建漂浮爱心
        function createFloatingHearts() {
            const hearts = ['❤️', '💕', '💗', '💖', '💓'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const floatingHeart = document.createElement('div');
                    floatingHeart.className = 'floating-heart';
                    floatingHeart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    floatingHeart.style.left = Math.random() * 100 + '%';
                    floatingHeart.style.animationDelay = Math.random() * 2 + 's';
                    floatingHeart.style.fontSize = (15 + Math.random() * 20) + 'px';
                    heartsBg.appendChild(floatingHeart);

                    setTimeout(() => floatingHeart.remove(), 4000);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
