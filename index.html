<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }

        .heart-container {
            position: relative;
            width: 200px;
            height: 200px;
            animation: heartbeat 1s ease-in-out infinite;
        }

        .heart {
            position: absolute;
            width: 100px;
            height: 90px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 50%, #ff4757 100%);
            border-radius: 50px 50px 0 0;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .heart::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes expand {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        .heart-expand {
            animation: expand 1.5s ease-out forwards;
        }

        .yyy-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 0;
            color: #feca57;
            text-shadow: 0 0 50px rgba(254, 202, 87, 0.8);
            transition: all 0.8s ease;
            z-index: 100;
            display: flex;
            gap: 20px;
        }

        .yyy-display.show {
            transform: translate(-50%, -50%) scale(1);
            font-size: 200px;
        }

        .yyy-letter {
            animation: yyyPulse 1s ease-in-out infinite;
        }

        .yyy-letter:nth-child(2) { animation-delay: 0.2s; }
        .yyy-letter:nth-child(3) { animation-delay: 0.4s; }

        @keyframes yyyPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .falling-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .falling-char {
            position: absolute;
            top: -100px;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                top: -100px;
                transform: rotate(0deg);
                opacity: 1;
            }
            100% {
                top: 105vh;
                transform: rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="heart-container" id="heartContainer">
        <div class="heart" id="heart"></div>
    </div>

    <div class="yyy-display" id="yyyDisplay">
        <span class="yyy-letter">Y</span>
        <span class="yyy-letter">Y</span>
        <span class="yyy-letter">Y</span>
    </div>

    <div class="falling-container" id="fallingContainer"></div>

    <script>
        const heart = document.getElementById('heart');
        const heartContainer = document.getElementById('heartContainer');
        const yyyDisplay = document.getElementById('yyyDisplay');
        const fallingContainer = document.getElementById('fallingContainer');

        // 1. 爱心展开动画
        heart.classList.add('heart-expand');

        // 2. 3秒后显示YYY
        setTimeout(() => {
            heartContainer.style.display = 'none';
            yyyDisplay.classList.add('show');
        }, 3000);

        // 3. 6秒后YYY消失，开始掉落
        setTimeout(() => {
            yyyDisplay.classList.remove('show');
            createFallingChars();
        }, 6000);

        // 创建掉落的字 - 持续循环
        function createFallingChars() {
            const chars = ['顾', '毅', '磊', '❤', '姚', '应', '莺'];

            // 持续掉落
            setInterval(() => {
                const char = document.createElement('div');
                char.className = 'falling-char';
                char.textContent = chars[Math.floor(Math.random() * chars.length)];
                char.style.left = Math.random() * 100 + '%';
                char.style.animationDuration = (2 + Math.random() * 2) + 's';
                char.style.fontSize = (25 + Math.random() * 20) + 'px';
                fallingContainer.appendChild(char);

                setTimeout(() => char.remove(), 4000);
            }, 80);
        }
    </script>
</body>
</html>
